<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoviTech - Digital Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --lovitech-red: #ff0000;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
            text-align: center;
        }

        /* En-tête avec Logo */
        .profile-header {
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--lovitech-red);
            padding: 5px;
            background: #000;
            object-fit: contain;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            margin: 15px 0 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tagline {
            color: var(--lovitech-red);
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Stack de boutons principaux */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 18px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-link:active { transform: scale(0.97); background: rgba(255, 0, 0, 0.1); }

        .btn-link i {
            width: 30px;
            font-size: 1.3rem;
            margin-right: 15px;
            color: var(--lovitech-red);
        }

        .btn-link span { flex-grow: 1; text-align: left; }

        /* Boutons du bas (Enregistrer & Partager) */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-action {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-save { background-color: #ffffff; color: #000; }
        .btn-share { background-color: var(--lovitech-red); color: #fff; }

        /* Réseaux Sociaux clairs et fonctionnels */
        .social-row {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-row a {
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .social-row a:hover { border-color: var(--lovitech-red); color: var(--lovitech-red); }

        /* Couleurs officielles des réseaux pour la clarté */
        .fa-facebook { color: #1877F2; }
        .fa-instagram { color: #E4405F; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #FF0000; }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <img src="carte de service LOVITECH_Plan de travail 1.png" alt="Logo LoviTech" class="logo-circle">
        <h1>LoviTech </h1>
        <div class="tagline">chaque problème a sa solution</div>
    </div>

    <div class="links-stack">
        <a href="tel:+243838984902" class="btn-link">
            <i class="fas fa-phone-alt"></i> <span>Appeler</span>
        </a>
        <a href="https://wa.me/243838984902" class="btn-link">
            <i class="fab fa-whatsapp"></i> <span>WhatsApp Business</span>
        </a>
        <a href="mailto: lovitech01@gmail.com" class="btn-link">
            <i class="fas fa-envelope"></i> <span>Envoyer un Email</span>
        </a>
        <a href="https://lovitech-888.github.io/Lovitech/" class="btn-link">
            <i class="fas fa-globe"></i> <span>Site Web Officiel</span>
        </a>
        <a href="https://lovitech-888.github.io/Lovitech/#realisations" class="btn-link">
            <i class="fas fa-tools"></i> <span>Nos Réalisations</span>
        </a>
    </div>

        <div class="action-grid">
        <a href="Lovitech.vcf" download="Lovitech.vcf" class="btn-action btn-save" style="text-decoration: none;">
    <i class="fas fa-user-plus"></i> Enregistrer
        </a>
        <button class="btn-action btn-share" onclick="shareProfile()">
            <i class="fas fa-share-alt"></i> Partager
        </button>
    </div>

    <div class="social-row">
        <a href="https://www.facebook.com/profile.php?id=61571262126506" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/lovitech01?igsh=bjRmMzdlNGU3dWRs" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@lovitech.01?_r=1&_t=ZS-967NCQN6CMH" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://youtube.com/@lovitech01?si=L6-JgwDa834x2yVe" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>

    <footer>
        © 2026 LoviTech Engineering · Lubumbashi
    </footer>
</div>

<script>
    // Fonction pour partager le lien
    function shareProfile() {
        if (navigator.share) {
            navigator.share({
                title: 'LoviTech Engineering',
                text: 'Découvrez mes services en électronique et sécurité.',
                url: window.location.href,
            });
        } else {
            alert("Le lien a été copié dans votre presse-papier !");
            navigator.clipboard.writeText(window.location.href);
        }
    }
</script>

</body>
</html>
